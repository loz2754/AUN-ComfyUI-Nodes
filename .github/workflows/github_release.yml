name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: Publish GitHub release from tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from changelog
        id: changelog
        shell: python3
        run: |
          import re, os, pathlib

          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          content = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              r'^## \[' + re.escape(version) + r'\]\s*-\s*\S+\s*(.+?)(?=^## \[|\Z)',
              re.DOTALL | re.MULTILINE
          )
          m = pattern.search(content)
          if m:
              text = m.group(1).strip()
              lines = [l for l in text.splitlines() if l.strip() and not l.strip().startswith("###")]
              body = "\n".join(lines) if lines else "Release " + version
          else:
              body = "Release " + version
          body_path = os.path.join(os.environ["RUNNER_TEMP"], "release-notes.md")
          pathlib.Path(body_path).write_text(body, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"body_path={body_path}\n")

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AUN-ComfyUI-Nodes ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body_path }}
          update_release: true